name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Assemble and sign artifacts
        run: >-
          ./gradlew
          :pagbank-spring-boot-autoconfigure:publishMavenJavaPublicationToLocalRepository
          :pagbank-spring-boot-starter:publishMavenJavaPublicationToLocalRepository
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Upload bundle to Maven Central
        run: |
          cd build/local-repo && zip -r ../../bundle.zip . && cd ../..
          TOKEN=$(printf '%s:%s' "$OSSRH_USERNAME" "$OSSRH_PASSWORD" | base64 -w 0)
          curl --fail-with-body -X POST \
            "https://central.sonatype.com/api/v1/publisher/upload?name=pagbank-${GITHUB_REF_NAME}&publicationType=AUTOMATIC" \
            -H "Authorization: Bearer $TOKEN" \
            --form "bundle=@bundle.zip"
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
