name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build

      - name: Assemble and sign artifacts
        run: >-
          ./gradlew
          :pagbank-spring-boot-autoconfigure:publishMavenJavaPublicationToLocalRepository
          :pagbank-spring-boot-starter:publishMavenJavaPublicationToLocalRepository
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}

      - name: Upload bundle to Maven Central
        run: |
          cd build/local-repo && zip -r ../../bundle.zip . && cd ../..
          TOKEN=$(printf '%s:%s' "$OSSRH_USERNAME" "$OSSRH_PASSWORD" | base64 -w 0)
          DEPLOYMENT_ID=$(curl --fail-with-body -s -X POST \
            "https://central.sonatype.com/api/v1/publisher/upload?name=pagbank-${GITHUB_REF_NAME}&publicationType=USER_MANAGED" \
            -H "Authorization: Bearer $TOKEN" \
            --form "bundle=@bundle.zip")
          echo "Deployment ID: $DEPLOYMENT_ID"

          echo "Aguardando validação..."
          for i in $(seq 1 20); do
            sleep 15
            STATUS=$(curl -s -X POST \
              "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}" \
              -H "Authorization: Bearer $TOKEN" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deploymentState',''))")
            echo "Status: $STATUS"
            if [ "$STATUS" = "VALIDATED" ]; then break; fi
            if [ "$STATUS" = "FAILED" ]; then echo "Validação falhou"; exit 1; fi
          done

          echo "Publicando..."
          curl --fail-with-body -s -X POST \
            "https://central.sonatype.com/api/v1/publisher/deployment/${DEPLOYMENT_ID}" \
            -H "Authorization: Bearer $TOKEN"
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
